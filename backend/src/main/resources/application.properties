spring.application.name=handyhire-backend

# ─── PostgreSQL Database (Aiven Cloud) ────────────────────────────────────
spring.datasource.url=jdbc:postgresql://pg-15fa274c-passmail-280c.k.aivencloud.com:23283/defaultdb?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${AIVEN_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Mail (Now Secured) ───────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.example.handyhirebackend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.mail=DEBUG