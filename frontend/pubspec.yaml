name: handyhire
description: "HandyHire service app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  image_picker: ^1.1.2
  # Added for API integration with the Spring Boot backend.
  http: ^1.2.2
  shared_preferences: ^2.5.5
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Ensure there are exactly 2 spaces before 'assets:' 
  # and 4 spaces before the '- assets/images/'
  assets:
    - assets/